<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交对局记录 - 三国杀</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .submit-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            color: #fff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffd700;
        }
        .form-group textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #8B4513;
            border-radius: 4px;
            color: #fff;
            padding: 10px;
            font-family: monospace;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #8B4513;
            border-radius: 4px;
            color: #fff;
        }
        .btn-submit {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background: #218838;
        }
        .btn-submit:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .log-preview {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .status-message {
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
        }
        .status-success {
            background: rgba(40, 167, 69, 0.3);
            border: 1px solid #28a745;
            color: #28a745;
        }
        .status-error {
            background: rgba(220, 53, 69, 0.3);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="submit-container">
        <h2 style="color: #ffd700; margin-bottom: 20px;">提交对局记录</h2>
        
        <div class="form-group">
            <label>GitHub Token (需要repo权限):</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="width: 100%; padding: 8px;">
            <small style="color: #aaa; margin-top: 5px; display: block;">
                获取token: <a href="https://github.com/settings/tokens" target="_blank" style="color: #007bff;">点击这里</a>
                (勾选repo权限)
            </small>
        </div>

        <div class="form-group">
            <label>反馈类型:</label>
            <select id="feedbackType" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid #8B4513; border-radius: 4px; color: #fff;">
                <option value="game-log">对局记录</option>
                <option value="bug-report">Bug报告</option>
                <option value="feedback">功能建议</option>
            </select>
        </div>

        <div class="form-group">
            <label>补充说明 (可选):</label>
            <textarea id="feedbackText" placeholder="描述你遇到的问题或建议..."></textarea>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="includeLog" checked> 包含对局日志
            </label>
        </div>

        <div class="form-group">
            <button class="btn-submit" onclick="submitLog()">提交记录</button>
            <button class="btn-sm" onclick="downloadLog()" style="margin-left: 10px; background: #6c757d;">下载日志</button>
            <button class="btn-sm" onclick="window.close()" style="margin-left: 10px; background: #6c757d;">取消</button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="form-group" style="margin-top: 20px;">
            <label>对局日志预览:</label>
            <div class="log-preview" id="logPreview">加载中...</div>
        </div>
    </div>

    <script>
        // 从localStorage加载对局记录
        let matchHistory = [];
        
        function loadMatchHistory() {
            try {
                matchHistory = JSON.parse(localStorage.getItem('sgsMatchHistory') || '[]');
                updatePreview();
            } catch(e) {
                document.getElementById('logPreview').textContent = '加载失败: ' + e.message;
            }
        }

        function updatePreview() {
            const preview = document.getElementById('logPreview');
            if (matchHistory.length === 0) {
                preview.textContent = '暂无对局记录';
                return;
            }

            // 显示最近一场对局的摘要
            const latest = matchHistory[0];
            const date = new Date(latest.startTime);
            let text = `对局时间: ${date.toLocaleString('zh-CN')}\n`;
            text += `结果: ${latest.result === 'win' ? '胜利' : '失败'}\n`;
            text += `持续时间: ${Math.floor(latest.duration / 60000)}分${Math.floor((latest.duration % 60000) / 1000)}秒\n\n`;
            text += `玩家信息:\n`;
            latest.players.forEach(p => {
                text += `  ${p.name} - ${p.hero}${p.identity ? ' - ' + p.identity : ''}\n`;
            });
            text += `\n详细日志事件数: ${latest.log ? latest.log.length : 0}\n`;
            text += `\n(完整日志将在提交时发送)`;

            preview.textContent = text;
        }

        // 提交日志到GitHub Issues
        async function submitLog() {
            const token = document.getElementById('githubToken').value.trim();
            const feedbackType = document.getElementById('feedbackType').value;
            const feedbackText = document.getElementById('feedbackText').value.trim();
            const includeLog = document.getElementById('includeLog').checked;

            if (!token) {
                showStatus('请输入GitHub Token', 'error');
                return;
            }

            if (matchHistory.length === 0) {
                showStatus('没有可提交的对局记录', 'error');
                return;
            }

            // 构建Issue内容
            const latest = matchHistory[0];
            const date = new Date(latest.startTime);
            
            let body = `## 对局记录\n\n`;
            body += `**时间**: ${date.toLocaleString('zh-CN')}\n`;
            body += `**结果**: ${latest.result === 'win' ? '✅ 胜利' : '❌ 失败'}\n`;
            body += `**持续时间**: ${Math.floor(latest.duration / 60000)}分${Math.floor((latest.duration % 60000) / 1000)}秒\n\n`;
            
            body += `### 玩家信息\n`;
            latest.players.forEach(p => {
                body += `- ${p.name} - **${p.hero}**${p.identity ? ' - ' + p.identity : ''}\n`;
            });

            if (feedbackText) {
                body += `\n### 用户反馈\n${feedbackText}\n`;
            }

            if (includeLog && latest.log) {
                body += `\n### 对局日志\n<details><summary>点击展开详细日志 (${latest.log.length} 事件)</summary>\n\n\`\`\`json\n${JSON.stringify(latest.log, null, 2)}\n\`\`\`\n</details>\n`;
            }

            // 提交到GitHub Issues
            const issueData = {
                title: `[${feedbackType}] 对局记录 - ${date.toLocaleDateString('zh-CN')}`,
                body: body,
                labels: [feedbackType]
            };

            try {
                showStatus('正在提交...', 'info');
                
                const response = await fetch('https://api.github.com/repos/cjh-98/sanguosha/issues', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(issueData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '提交失败');
                }

                const result = await response.json();
                showStatus(`提交成功！Issue已创建: <a href="${result.html_url}" target="_blank">${result.html_url}</a>`, 'success');
                
                // 保存token到localStorage（方便下次使用）
                localStorage.setItem('sgsGitHubToken', token);

            } catch(e) {
                showStatus('提交失败: ' + e.message, 'error');
            }
        }

        // 下载日志
        function downloadLog() {
            if (matchHistory.length === 0) {
                alert('没有可下载的对局记录');
                return;
            }

            const latest = matchHistory[0];
            const blob = new Blob([JSON.stringify(latest, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sanguosha_match_${latest.matchId}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 显示状态消息
        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.innerHTML = message;
            status.className = `status-message status-${type}`;
            status.style.display = 'block';
        }

        // 页面加载时恢复token
        window.onload = function() {
            const savedToken = localStorage.getItem('sgsGitHubToken');
            if (savedToken) {
                document.getElementById('githubToken').value = savedToken;
            }
            loadMatchHistory();
        };
    </script>
</body>
</html>
