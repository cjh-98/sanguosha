# 自动收集对局日志

当用户提交对局记录（通过submit-log.html）时，会自动创建GitHub Issue。
这个workflow可以自动处理这些Issue，比如：
- 标签分类
- 数据分析
- 自动回复

name: Process Game Log Issues

on:
  issues:
    types: [opened]

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'game-log')
    steps:
      - name: Add welcome comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '感谢提交对局记录！开发者会尽快查看分析。\n\n如果这是bug报告，请尽量详细描述问题发生的步骤。'
            });
