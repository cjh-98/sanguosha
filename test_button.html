<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>按钮测试</title>
</head>
<body>
    <h1>按钮测试页面</h1>
    <button onclick="alert('按钮1点击正常！')">测试按钮1（inline onclick）</button><br><br>
    <button id="btn2">测试按钮2（addEventListener）</button><br><br>
    <button onclick="goSetup()">模拟开始游戏</button><br><br>
    <div id="log"></div>
    
    <script>
    'use strict';
    // 模拟Logger
    const Logger = { action(){}, error(){} };
    const Cfg = { mode:'standard', playerCount:8, pickMode:'random', includeMilitary:true, bannedHeroes:[], bannedCards:[] };
    
    function goSetup() {
        alert('goSetup() 被调用！');
    }
    
    function initSetup() {
        alert('initSetup() 被调用！');
    }
    
    function showScreen(id) {
        alert('showScreen(' + id + ') 被调用！');
    }
    
    // 测试addEventListener
    document.getElementById('btn2').addEventListener('click', function() {
        document.getElementById('log').innerHTML += '<p>按钮2点击正常！</p>';
    });
    
    // 检查全局错误
    window.addEventListener('error', function(e) {
        document.getElementById('log').innerHTML += '<p style="color:red">错误: ' + e.message + '</p>';
    });
    
    document.getElementById('log').innerHTML = '<p>页面加载完成，可以测试按钮了。</p>';
    </script>
</body>
</html>
